<text x="24" y="121" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#bd5b12">$</tspan><tspan fill="#33302a"> </tspan><tspan fill="#bd5b12" font-weight="600">cook</tspan><tspan fill="#33302a"> ship              </tspan><tspan fill="#8f8676"># exactly one new unit: build/switch/game.zip</tspan></text>
<text x="24" y="146" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#bd5b12">$</tspan><tspan fill="#33302a"> </tspan><tspan fill="#bd5b12" font-weight="600">nvim</tspan><tspan fill="#33302a"> images/enemy.svg  </tspan><tspan fill="#8f8676"># a bigger sword calls for a bigger shield</tspan></text>
