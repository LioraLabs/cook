<text x="779" y="26" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="13" fill="#a79e8c">terminal</text>
<text x="24" y="71" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#bd5b12">$</tspan><tspan fill="#33302a"> </tspan><tspan fill="#bd5b12" font-weight="600">cook</tspan><tspan fill="#33302a"> ship              </tspan><tspan fill="#8f8676"># rasterizes, packs the sheet, zips a bundle per platform</tspan></text>
