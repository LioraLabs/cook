<text x="779" y="26" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="13" fill="#6f6659">terminal</text>
<text x="24" y="71" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#f2a541">$</tspan><tspan fill="#e8e0d2"> </tspan><tspan fill="#f2a541" font-weight="600">cook</tspan><tspan fill="#e8e0d2"> ship              </tspan><tspan fill="#6f6659"># rasterizes, packs the sheet, zips a bundle per platform</tspan></text>
<text x="24" y="96" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#f2a541">$</tspan><tspan fill="#e8e0d2"> </tspan><tspan fill="#f2a541" font-weight="600">nvim</tspan><tspan fill="#e8e0d2"> Cookfile          </tspan><tspan fill="#6f6659"># add {"name":"switch","level":"9"} to platforms</tspan></text>
<text x="24" y="121" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#f2a541">$</tspan><tspan fill="#e8e0d2"> </tspan><tspan fill="#f2a541" font-weight="600">cook</tspan><tspan fill="#e8e0d2"> ship              </tspan><tspan fill="#6f6659"># exactly one new unit: build/switch/game.zip</tspan></text>
<text x="24" y="146" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#f2a541">$</tspan><tspan fill="#e8e0d2"> </tspan><tspan fill="#f2a541" font-weight="600">nvim</tspan><tspan fill="#e8e0d2"> images/enemy.svg  </tspan><tspan fill="#6f6659"># a bigger sword calls for a bigger shield</tspan></text>
<text x="24" y="171" xml:space="preserve" font-family="ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15"><tspan fill="#f2a541">$</tspan><tspan fill="#e8e0d2"> </tspan><tspan fill="#f2a541" font-weight="600">cook</tspan><tspan fill="#e8e0d2"> ship              </tspan><tspan fill="#6f6659"># re-rasterizes enemy.png, repacks, re-zips every platform</tspan></text>
