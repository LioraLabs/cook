<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cook dag</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
#cy { width: 100vw; height: 100vh; }
#detail {
  position: fixed; top: 0; right: 0; width: 360px; height: 100vh;
  background: #16163a; border-left: 1px solid #2a2a4a;
  padding: 20px; overflow-y: auto; display: none;
  font-size: 13px; z-index: 10;
}
#detail.visible { display: block; }
#detail h2 { font-size: 16px; color: #818cf8; margin-bottom: 12px; word-break: break-all; }
#detail h3 { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 16px; margin-bottom: 4px; }
#detail .value { color: #d1d5db; margin-bottom: 8px; word-break: break-all; }
#detail code { font-size: 12px; color: #c4b5fd; background: #1e1e3a; padding: 2px 6px; border-radius: 3px; }
#detail .badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; margin-bottom: 8px;
}
#detail .badge.cached { background: #064e3b; color: #6ee7b7; }
#detail .badge.uncached { background: #1f2937; color: #9ca3af; }
#detail .badge.modified { background: #431407; color: #fdba74; }
#detail .badge.clean { background: #052e16; color: #86efac; }
#detail .close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: #6b7280; font-size: 18px; cursor: pointer;
}
#detail .close:hover { color: #e0e0e0; }
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 40px;
  background: #16163a; border-bottom: 1px solid #2a2a4a;
  display: flex; align-items: center; padding: 0 16px; gap: 16px;
  font-size: 13px; color: #8888cc; z-index: 10;
}
#header .title { font-weight: 600; color: #818cf8; }
#header .stat { color: #6b7280; }
#header .stat span { color: #a5b4fc; }
#legend {
  position: fixed; bottom: 16px; left: 16px;
  background: #16163a; border: 1px solid #2a2a4a; border-radius: 8px;
  padding: 12px 16px; font-size: 11px; color: #8888aa; z-index: 10;
}
#legend .section { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 8px; margin-bottom: 4px; }
#legend .section:first-child { margin-top: 0; }
#legend .item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
#legend .item:last-child { margin-bottom: 0; }
#legend .swatch-ellipse {
  width: 16px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
#legend .swatch-rect {
  width: 14px; height: 12px; border-radius: 3px; flex-shrink: 0;
}
#legend .swatch-line {
  width: 20px; height: 2px; flex-shrink: 0; position: relative;
}
#legend .swatch-line.dashed {
  background: repeating-linear-gradient(90deg, #6366f1 0px, #6366f1 4px, transparent 4px, transparent 8px);
  height: 2px;
}
</style>
</head>
<body>

<div id="header">
  <span class="title">cook dag</span>
  <span class="stat">target: <span id="stat-target">—</span></span>
  <span class="stat">waves: <span id="stat-waves">—</span></span>
  <span class="stat">units: <span id="stat-units">—</span></span>
  <span class="stat">files: <span id="stat-files">—</span></span>
  <span class="stat">cached: <span id="stat-cached">—</span></span>
</div>

<div id="cy"></div>

<div id="detail">
  <button class="close" onclick="closeDetail()">&times;</button>
  <div id="detail-content"></div>
</div>

<div id="legend">
  <div class="section">File nodes (ellipse)</div>
  <div class="item">
    <div class="swatch-ellipse" style="background:#1e293b;border:2px solid #22c55e;"></div>
    Clean (not modified)
  </div>
  <div class="item">
    <div class="swatch-ellipse" style="background:#1e293b;border:2px solid #f59e0b;"></div>
    Modified
  </div>
  <div class="section">Unit nodes (rect)</div>
  <div class="item">
    <div class="swatch-rect" style="background:#1e293b;border:2px solid #22c55e;"></div>
    Cached
  </div>
  <div class="item">
    <div class="swatch-rect" style="background:#1e293b;border:2px solid #6b7280;"></div>
    Needs rebuild
  </div>
  <div class="section">Edges</div>
  <div class="item">
    <div class="swatch-line" style="background:#3a3a5a;"></div>
    Intra-wave
  </div>
  <div class="item">
    <div class="swatch-line dashed"></div>
    Inter-wave
  </div>
</div>

<script>
const DAG = /*DAG_DATA_PLACEHOLDER*/{};

function buildElements() {
  var elements = [];
  var multiWave = DAG.waves && DAG.waves.length > 1;

  if (!DAG.waves || DAG.waves.length === 0) {
    return elements;
  }

  for (var wi = 0; wi < DAG.waves.length; wi++) {
    var wave = DAG.waves[wi];
    var waveId = 'wave:' + wi;

    // Add wave compound node only if multiple waves
    if (multiWave) {
      elements.push({
        data: {
          id: waveId,
          label: 'Wave ' + (wi + 1),
          type: 'wave',
        }
      });
    }

    // Add nodes
    for (var ni = 0; ni < wave.nodes.length; ni++) {
      var node = wave.nodes[ni];
      var nodeData = {
        id: node.id,
        label: node.kind === 'unit'
          ? (node.label + ' [' + node.recipe + ']')
          : node.label,
        type: node.kind,
        waveIndex: wi,
      };

      if (node.kind === 'file') {
        nodeData.modified = node.modified === true;
        nodeData.path = node.id.replace(/^file:/, '');
      } else {
        // unit
        nodeData.cached = node.cached === true;
        nodeData.recipe = node.recipe;
        nodeData.command = node.command;
        nodeData.output = node.output;
        nodeData.depKind = node.dep_kind;
        nodeData.groupIndex = node.group_index;
      }

      var elemData = { data: nodeData };
      if (multiWave) {
        elemData.data.parent = waveId;
      }
      elements.push(elemData);
    }

    // Add intra-wave edges
    for (var ei = 0; ei < wave.edges.length; ei++) {
      var edge = wave.edges[ei];
      elements.push({
        data: {
          id: 'intra:' + edge.from + '->' + edge.to,
          source: edge.from,
          target: edge.to,
          type: 'intra',
        }
      });
    }
  }

  // Add inter-wave edges
  if (DAG.inter_wave_edges) {
    for (var ii = 0; ii < DAG.inter_wave_edges.length; ii++) {
      var iwe = DAG.inter_wave_edges[ii];
      elements.push({
        data: {
          id: 'inter:' + iwe.from + '->' + iwe.to,
          source: iwe.from,
          target: iwe.to,
          type: 'inter',
        }
      });
    }
  }

  return elements;
}

function buildStyle() {
  return [
    // Wave compound container
    {
      selector: 'node[type="wave"]',
      style: {
        'background-color': '#1e1e3a',
        'border-color': '#6366f1',
        'border-width': 2,
        'border-style': 'dashed',
        'label': 'data(label)',
        'text-valign': 'top',
        'text-halign': 'center',
        'color': '#818cf8',
        'font-size': '12px',
        'padding': '24px',
        'text-margin-y': -8,
      }
    },
    // File nodes — clean
    {
      selector: 'node[type="file"][!modified]',
      style: {
        'background-color': '#1e293b',
        'border-color': '#22c55e',
        'border-width': 2,
        'color': '#86efac',
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'width': 'label',
        'height': 28,
        'padding': '10px',
        'shape': 'ellipse',
      }
    },
    // File nodes — modified
    {
      selector: 'node[type="file"][?modified]',
      style: {
        'background-color': '#1e293b',
        'border-color': '#f59e0b',
        'border-width': 2,
        'color': '#fbbf24',
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'width': 'label',
        'height': 28,
        'padding': '10px',
        'shape': 'ellipse',
      }
    },
    // Unit nodes — cached
    {
      selector: 'node[type="unit"][?cached]',
      style: {
        'background-color': '#1e293b',
        'border-color': '#22c55e',
        'border-width': 2,
        'color': '#a0f0a0',
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'width': 'label',
        'height': 30,
        'padding': '10px',
        'shape': 'round-rectangle',
      }
    },
    // Unit nodes — needs rebuild
    {
      selector: 'node[type="unit"][!cached]',
      style: {
        'background-color': '#1e293b',
        'border-color': '#6b7280',
        'border-width': 2,
        'color': '#d1d5db',
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'width': 'label',
        'height': 30,
        'padding': '10px',
        'shape': 'round-rectangle',
      }
    },
    // Intra-wave edges
    {
      selector: 'edge[type="intra"]',
      style: {
        'width': 1.5,
        'line-color': '#3a3a5a',
        'target-arrow-color': '#3a3a5a',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
      }
    },
    // Inter-wave edges
    {
      selector: 'edge[type="inter"]',
      style: {
        'width': 2.5,
        'line-color': '#6366f1',
        'line-style': 'dashed',
        'target-arrow-color': '#6366f1',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
      }
    },
  ];
}

function initCy() {
  var cy = window.cy = cytoscape({
    container: document.getElementById('cy'),
    elements: buildElements(),
    layout: {
      name: 'dagre',
      rankDir: 'TB',
      nodeSep: 40,
      rankSep: 70,
      padding: 80,
      animate: false,
    },
    style: buildStyle(),
  });

  cy.on('tap', 'node[type="file"]', function(evt) {
    showFileDetail(evt.target.data());
  });

  cy.on('tap', 'node[type="unit"]', function(evt) {
    showUnitDetail(evt.target.data());
  });

  cy.on('tap', function(evt) {
    if (evt.target === cy) {
      closeDetail();
    }
  });

  updateStats();
}

function updateStats() {
  if (!DAG.waves) return;

  var totalUnits = 0;
  var totalFiles = 0;
  var totalCached = 0;

  for (var wi = 0; wi < DAG.waves.length; wi++) {
    var wave = DAG.waves[wi];
    for (var ni = 0; ni < wave.nodes.length; ni++) {
      var node = wave.nodes[ni];
      if (node.kind === 'unit') {
        totalUnits++;
        if (node.cached) totalCached++;
      } else if (node.kind === 'file') {
        totalFiles++;
      }
    }
  }

  document.getElementById('stat-target').textContent = DAG.target || '—';
  document.getElementById('stat-waves').textContent = DAG.waves.length;
  document.getElementById('stat-units').textContent = totalUnits;
  document.getElementById('stat-files').textContent = totalFiles;
  document.getElementById('stat-cached').textContent = totalCached + '/' + totalUnits;
}

function showFileDetail(data) {
  var el = document.getElementById('detail-content');
  var modClass = data.modified ? 'modified' : 'clean';
  var modText = data.modified ? 'Modified' : 'Clean';

  var html = '<h2>' + escapeHtml(data.label) + '</h2>';
  html += '<span class="badge ' + modClass + '">' + modText + '</span>';

  html += '<h3>Path</h3>';
  html += '<div class="value">' + escapeHtml(data.path || data.label) + '</div>';

  html += '<h3>Status</h3>';
  html += '<div class="value">' + (data.modified ? 'Modified — will trigger rebuild' : 'Unchanged') + '</div>';

  el.innerHTML = html;
  document.getElementById('detail').classList.add('visible');
}

function showUnitDetail(data) {
  var el = document.getElementById('detail-content');
  var cachedClass = data.cached ? 'cached' : 'uncached';
  var cachedText = data.cached ? 'Cached' : 'Needs rebuild';

  var html = '<h2>' + escapeHtml(data.label) + '</h2>';
  html += '<span class="badge ' + cachedClass + '">' + cachedText + '</span>';

  if (data.recipe) {
    html += '<h3>Recipe</h3>';
    html += '<div class="value">' + escapeHtml(data.recipe) + '</div>';
  }

  html += '<h3>Command</h3>';
  html += '<div class="value"><code>' + escapeHtml(data.command || 'N/A') + '</code></div>';

  if (data.output) {
    html += '<h3>Output</h3>';
    html += '<div class="value">' + escapeHtml(data.output) + '</div>';
  }

  html += '<h3>Dep Kind</h3>';
  html += '<div class="value">' + escapeHtml(data.depKind || 'N/A');
  if (data.groupIndex !== null && data.groupIndex !== undefined) {
    html += ' (group ' + data.groupIndex + ')';
  }
  html += '</div>';

  el.innerHTML = html;
  document.getElementById('detail').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('visible');
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

initCy();
</script>
</body>
</html>
