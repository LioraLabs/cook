[[run]]
args = ["build"]
[run.assert]
exists = ["build/probed.txt"]

[[run]]
args = ["build"]
[run.assert]
unchanged = ["build/probed.txt"]
# unchanged alone proves the probe-value cache (a re-produced probe would
# re-key the unit and change the nonce); the cached marker pins the unit
# cache actually re-serving rather than re-executing identical bytes.
output_contains = ["(2/3 cached)"]
